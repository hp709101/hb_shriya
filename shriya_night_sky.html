<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Shriya ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet"/>
  <style>
    /* =========================================================
       RESET & BASE
    ========================================================= */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    /* =========================================================
       SCENE WRAPPER
    ========================================================= */
    .scene {
      position: relative;
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: linear-gradient(
        180deg,
        #020818 0%,
        #050f2e 20%,
        #0a1a4a 45%,
        #0f2060 65%,
        #1a2e6e 80%,
        #1e1040 100%
      );
    }

    /* =========================================================
       NEBULA / AURORA LAYER
    ========================================================= */
    .nebula {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .nebula::before {
      content: '';
      position: absolute;
      top: 5%; left: 10%;
      width: 60vw; height: 40vh;
      background: radial-gradient(ellipse at center,
        rgba(100, 60, 180, 0.18) 0%,
        rgba(60, 30, 120, 0.10) 40%,
        transparent 70%);
      border-radius: 50%;
      animation: nebulaDrift 18s ease-in-out infinite alternate;
      filter: blur(30px);
    }
    .nebula::after {
      content: '';
      position: absolute;
      top: 15%; right: 5%;
      width: 40vw; height: 30vh;
      background: radial-gradient(ellipse at center,
        rgba(60, 120, 200, 0.15) 0%,
        rgba(30, 80, 160, 0.08) 40%,
        transparent 70%);
      border-radius: 50%;
      animation: nebulaDrift 22s ease-in-out infinite alternate-reverse;
      filter: blur(25px);
    }
    @keyframes nebulaDrift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(3vw, 2vh) scale(1.08); }
    }

    /* =========================================================
       STARS LAYER  (parallax — slow)
    ========================================================= */
    .stars-layer {
      position: absolute; inset: 0;
      z-index: 2;
      pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--dur) ease-in-out infinite var(--delay);
    }
    @keyframes twinkle {
      0%, 100% { opacity: var(--min-op); transform: scale(1); }
      50%       { opacity: 1;             transform: scale(1.35); }
    }

    /* =========================================================
       MOON
    ========================================================= */
    .moon-wrapper {
      position: absolute;
      top: 8vh; right: 10vw;
      z-index: 3;
      pointer-events: none;
    }
    .moon {
      width: clamp(70px, 10vw, 110px);
      height: clamp(70px, 10vw, 110px);
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%,
        #fffbe8 0%, #fff5c0 35%, #f5d98a 70%, #e8c060 100%);
      box-shadow:
        0 0 30px 12px rgba(255, 240, 160, 0.45),
        0 0 70px 30px rgba(255, 220, 100, 0.25),
        0 0 120px 60px rgba(255, 200, 80, 0.12);
      animation: moonPulse 5s ease-in-out infinite;
    }
    /* subtle craters */
    .moon::before {
      content: '';
      position: absolute;
      top: 22%; left: 55%;
      width: 16%; height: 16%;
      border-radius: 50%;
      background: rgba(200, 160, 60, 0.30);
      box-shadow: -1.5em 1.2em 0 -0.1em rgba(200,160,60,0.18),
                  0.8em  2.0em 0 -0.2em rgba(200,160,60,0.15);
    }
    /* halo ring */
    .moon-halo {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 160%;  height: 160%;
      border-radius: 50%;
      border: 1px solid rgba(255, 240, 160, 0.12);
      box-shadow: 0 0 30px 8px rgba(255, 240, 120, 0.08);
      animation: moonPulse 5s ease-in-out infinite reverse;
    }
    @keyframes moonPulse {
      0%, 100% { filter: brightness(1)  drop-shadow(0 0 12px rgba(255,240,120,0.5)); transform: scale(1); }
      50%       { filter: brightness(1.12) drop-shadow(0 0 22px rgba(255,240,120,0.8)); transform: scale(1.04); }
    }

    /* =========================================================
       SILHOUETTE TREE (left side)
    ========================================================= */
    .tree-layer {
      position: absolute;
      bottom: 0; left: 0;
      z-index: 8;
      pointer-events: none;
      width: clamp(180px, 28vw, 340px);
    }
    .tree-layer svg {
      width: 100%; height: auto;
      display: block;
    }

    /* =========================================================
       GROUND / HORIZON GLOW
    ========================================================= */
    .horizon {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 18vh;
      background: linear-gradient(to top,
        rgba(10, 10, 40, 0.95) 0%,
        rgba(10, 10, 40, 0.6) 50%,
        transparent 100%);
      z-index: 7;
    }
    .horizon::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg,
        transparent 0%, rgba(100, 150, 255, 0.25) 30%,
        rgba(150, 180, 255, 0.35) 50%,
        rgba(100, 150, 255, 0.25) 70%,
        transparent 100%);
    }

    /* =========================================================
       BALLOONS
    ========================================================= */
    .balloon-field {
      position: absolute; inset: 0;
      z-index: 6;
      pointer-events: none;
    }
    .balloon-wrap {
      position: absolute;
      bottom: -20vh;
      animation: floatUp var(--rise) linear infinite var(--start);
    }
    .balloon {
      position: relative;
      width: var(--size);
      animation: sway var(--sway) ease-in-out infinite alternate var(--sw-del);
    }
    /* balloon oval */
    .balloon-body {
      width: 100%;
      padding-bottom: 120%;
      border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
      background: var(--color);
      box-shadow:
        inset -6px -6px 14px rgba(0,0,0,0.25),
        inset  4px  4px 10px rgba(255,255,255,0.30),
        0 0 18px 4px var(--glow);
      position: relative;
      overflow: hidden;
    }
    .balloon-body::before { /* highlight */
      content: '';
      position: absolute;
      top: 14%; left: 18%;
      width: 28%; height: 20%;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      transform: rotate(-30deg);
      filter: blur(2px);
    }
    /* knot */
    .balloon-knot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color);
      margin: 0 auto;
      filter: brightness(0.75);
    }
    /* string */
    .balloon-string {
      width: 1px;
      height: clamp(40px, 8vh, 70px);
      background: linear-gradient(to bottom, rgba(255,255,255,0.5), rgba(255,255,255,0.1));
      margin: 0 auto;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0); opacity: 0; }
      5%   { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-130vh); opacity: 0; }
    }
    @keyframes sway {
      0%   { transform: translateX(calc(var(--drift) * -1)); }
      100% { transform: translateX(var(--drift)); }
    }

    /* =========================================================
       FLOATING PARTICLES (tiny dots)
    ========================================================= */
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      z-index: 5;
      pointer-events: none;
      animation: particleDrift var(--pdur) linear infinite var(--pdel);
    }
    @keyframes particleDrift {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-80vh) translateX(var(--px)); opacity: 0; }
    }

    /* =========================================================
       TITLE / TEXT
    ========================================================= */
    .title-area {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
      animation: titleFadeIn 2.5s ease forwards;
    }
    @keyframes titleFadeIn {
      from { opacity: 0; transform: translate(-50%, -44%); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }
    .title-for {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.4em;
      color: rgba(200, 220, 255, 0.65);
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .title-name {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3.5rem, 12vw, 8rem);
      color: transparent;
      background: linear-gradient(135deg,
        #ffd6e8 0%, #ffb3d1 25%, #e8c8ff 50%, #b3d4ff 75%, #ffd6e8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      line-height: 1;
      text-shadow: none;
      filter: drop-shadow(0 0 18px rgba(255, 180, 230, 0.60))
              drop-shadow(0 0 40px rgba(200, 160, 255, 0.35));
      animation: nameShimmer 6s ease-in-out infinite;
    }
    @keyframes nameShimmer {
      0%, 100% { filter: drop-shadow(0 0 16px rgba(255,180,230,0.55)) drop-shadow(0 0 36px rgba(200,160,255,0.30)); }
      50%       { filter: drop-shadow(0 0 28px rgba(255,180,230,0.85)) drop-shadow(0 0 60px rgba(200,160,255,0.55)); }
    }
    .title-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.8rem, 1.8vw, 1rem);
      font-weight: 300;
      color: rgba(200, 220, 255, 0.50);
      letter-spacing: 0.2em;
      margin-top: 0.7rem;
    }
    /* small decorative hearts */
    .hearts {
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      color: rgba(255, 160, 200, 0.70);
      letter-spacing: 0.5em;
      margin-top: 0.6rem;
      animation: heartPulse 2.5s ease-in-out infinite;
    }
    @keyframes heartPulse {
      0%, 100% { transform: scale(1);    opacity: 0.7; }
      50%       { transform: scale(1.12); opacity: 1; }
    }

    /* =========================================================
       SHOOTING STARS
    ========================================================= */
    .shooting-star {
      position: absolute;
      z-index: 4;
      pointer-events: none;
      top: var(--sy); left: var(--sx);
      width: clamp(80px, 15vw, 180px);
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0.9), transparent);
      border-radius: 1px;
      transform: rotate(var(--angle));
      animation: shoot var(--sdur) ease-out infinite var(--sdel);
      opacity: 0;
    }
    @keyframes shoot {
      0%   { opacity: 0;   transform: rotate(var(--angle)) translateX(-30px); }
      10%  { opacity: 1; }
      80%  { opacity: 0.6; }
      100% { opacity: 0;   transform: rotate(var(--angle)) translateX(250px); }
    }
  </style>
</head>
<body>
<div class="scene" id="scene">

  <!-- NEBULA GLOW -->
  <div class="nebula"></div>

  <!-- STARS LAYER -->
  <div class="stars-layer" id="stars"></div>

  <!-- SHOOTING STARS -->
  <div id="shooting-stars"></div>

  <!-- MOON -->
  <div class="moon-wrapper">
    <div class="moon">
      <div class="moon-halo"></div>
    </div>
  </div>

  <!-- BALLOON FIELD -->
  <div class="balloon-field" id="balloons"></div>

  <!-- PARTICLES -->
  <div id="particles"></div>

  <!-- HORIZON -->
  <div class="horizon"></div>

  <!-- SILHOUETTE TREE -->
  <div class="tree-layer">
    <svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg" fill="#04081a">
      <!-- trunk -->
      <rect x="125" y="340" width="22" height="160" rx="6"/>
      <!-- main branches -->
      <path d="M136 340 Q80 290 30 260 Q70 265 90 270 Q60 230 10 200 Q60 215 90 230 Q70 190 40 160 Q80 180 100 200 Q95 155 75 120 Q105 150 115 175 Q118 130 105 95 Q130 135 130 170 Q132 120 125 80 Q145 125 140 165 Q145 120 160 85 Q155 130 148 170 Q160 150 180 125 Q168 158 155 178 Q175 160 205 145 Q185 175 160 192 Q185 182 215 175 Q195 205 165 212 Q195 215 225 225 Q200 240 170 238 Q200 250 230 265 Q198 268 172 258 L136 340z"/>
      <!-- small twigs -->
      <path d="M130 200 Q95 185 70 178" stroke="#04081a" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M134 230 Q105 222 80 218" stroke="#04081a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M140 265 Q165 250 185 242" stroke="#04081a" stroke-width="3" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- TITLE -->
  <div class="title-area">
    <div class="title-for">a magical night sky, just for</div>
    <div class="title-name">Shriya</div>
    <div class="title-sub">where every star whispers your name</div>
    <div class="hearts">♡ &nbsp; ♡ &nbsp; ♡</div>
  </div>

</div>

<script>
/* =========================================================
   STARS
========================================================= */
const starsEl = document.getElementById('stars');
const STAR_COUNT = window.innerWidth < 600 ? 140 : 220;

for (let i = 0; i < STAR_COUNT; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.4 + 0.6;     // 0.6–3px
  const minOp = (Math.random() * 0.3 + 0.15).toFixed(2);
  const dur = (Math.random() * 4 + 2.5).toFixed(2) + 's';
  const delay = (Math.random() * -8).toFixed(2) + 's';
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random() * 85}%;
    left:${Math.random() * 100}%;
    --dur:${dur}; --delay:${delay}; --min-op:${minOp};
    opacity:${minOp};
  `;
  starsEl.appendChild(s);
}

/* =========================================================
   SHOOTING STARS
========================================================= */
const shootEl = document.getElementById('shooting-stars');
const shootData = [
  { sx:'10%', sy:'12%', angle:'-20deg', sdur:'5s',  sdel:'1s'  },
  { sx:'55%', sy:'8%',  angle:'-25deg', sdur:'7s',  sdel:'3.5s'},
  { sx:'30%', sy:'20%', angle:'-15deg', sdur:'9s',  sdel:'6s'  },
  { sx:'70%', sy:'5%',  angle:'-30deg', sdur:'6s',  sdel:'9s'  },
  { sx:'15%', sy:'25%', angle:'-18deg', sdur:'8s',  sdel:'12s' },
];
shootData.forEach(d => {
  const el = document.createElement('div');
  el.className = 'shooting-star';
  el.style.cssText = `--sx:${d.sx};--sy:${d.sy};--angle:${d.angle};--sdur:${d.sdur};--sdel:${d.sdel};
    top:${d.sy}; left:${d.sx};`;
  shootEl.appendChild(el);
});

/* =========================================================
   BALLOONS
========================================================= */
const balloonField = document.getElementById('balloons');

// Balloon palette: [gradient/color, glow]
const BALLOON_COLORS = [
  ['linear-gradient(135deg,#ff6eb4,#ff2d7c)', 'rgba(255,100,160,0.55)'],
  ['linear-gradient(135deg,#ff9f5a,#ff5500)', 'rgba(255,140,80,0.50)'],
  ['linear-gradient(135deg,#a78bfa,#7c3aed)', 'rgba(160,120,255,0.55)'],
  ['linear-gradient(135deg,#34d399,#059669)', 'rgba(50,210,140,0.45)'],
  ['linear-gradient(135deg,#60a5fa,#2563eb)', 'rgba(80,160,255,0.50)'],
  ['linear-gradient(135deg,#fbbf24,#d97706)', 'rgba(255,200,60,0.55)'],
  ['linear-gradient(135deg,#f472b6,#be185d)', 'rgba(244,114,182,0.55)'],
  ['linear-gradient(135deg,#38bdf8,#0284c7)', 'rgba(56,190,248,0.50)'],
  ['linear-gradient(135deg,#c084fc,#9333ea)', 'rgba(192,132,252,0.55)'],
  ['linear-gradient(135deg,#fb7185,#e11d48)', 'rgba(251,113,133,0.55)'],
];

const BALLOON_COUNT = window.innerWidth < 600 ? 12 : 20;

function createBalloon() {
  const [color, glow] = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
  const size = clamp(30, 30 + Math.random() * 35, 65) + 'px';
  const left = (5 + Math.random() * 88) + '%';
  const rise = (12 + Math.random() * 20).toFixed(1) + 's';
  const start = (-(Math.random() * 20)).toFixed(1) + 's';
  const sway = (3 + Math.random() * 4).toFixed(1) + 's';
  const swDel = (Math.random() * -4).toFixed(1) + 's';
  const drift = (8 + Math.random() * 22).toFixed(0) + 'px';

  const wrap = document.createElement('div');
  wrap.className = 'balloon-wrap';
  wrap.style.cssText = `left:${left}; --rise:${rise}; --start:${start};`;

  wrap.innerHTML = `
    <div class="balloon" style="--size:${size};--sway:${sway};--sw-del:${swDel};--drift:${drift};">
      <div class="balloon-body" style="--color:${color};--glow:${glow};"></div>
      <div class="balloon-knot" style="--color:${color};"></div>
      <div class="balloon-string"></div>
    </div>`;
  return wrap;
}

for (let i = 0; i < BALLOON_COUNT; i++) {
  balloonField.appendChild(createBalloon());
}

function clamp(min, val, max) { return Math.min(max, Math.max(min, val)); }

/* =========================================================
   FLOATING PARTICLES
========================================================= */
const particleEl = document.getElementById('particles');
const PARTICLE_COUNT = window.innerWidth < 600 ? 20 : 35;

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = (Math.random() * 2.5 + 0.5).toFixed(1) + 'px';
  const left = (Math.random() * 100) + '%';
  const bottom = (Math.random() * 50) + 'px';
  const pdur = (10 + Math.random() * 15).toFixed(1) + 's';
  const pdel = (Math.random() * -15).toFixed(1) + 's';
  const px = ((Math.random() - 0.5) * 60).toFixed(0) + 'px';
  p.style.cssText = `
    width:${size}; height:${size};
    left:${left}; bottom:${bottom};
    --pdur:${pdur}; --pdel:${pdel}; --px:${px};
  `;
  particleEl.appendChild(p);
}

/* =========================================================
   SUBTLE PARALLAX ON MOUSE MOVE
========================================================= */
const scene = document.getElementById('scene');
let tX = 0, tY = 0, cX = 0, cY = 0;

document.addEventListener('mousemove', e => {
  tX = (e.clientX / window.innerWidth  - 0.5) * 18;
  tY = (e.clientY / window.innerHeight - 0.5) * 10;
});

// Also support touch
document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  tX = (t.clientX / window.innerWidth  - 0.5) * 14;
  tY = (t.clientY / window.innerHeight - 0.5) * 8;
}, { passive: true });

function parallaxLoop() {
  cX += (tX - cX) * 0.04;
  cY += (tY - cY) * 0.04;

  // Stars (slow)
  starsEl.style.transform = `translate(${cX * 0.4}px, ${cY * 0.4}px)`;
  // Moon (medium)
  document.querySelector('.moon-wrapper').style.transform =
    `translate(${cX * 0.6}px, ${cY * 0.6}px)`;
  // Balloons (fast) — handled by individual animations but shift field slightly
  balloonField.style.transform = `translate(${cX * -0.3}px, ${cY * -0.2}px)`;

  requestAnimationFrame(parallaxLoop);
}
parallaxLoop();
</script>
</body>
</html>
